aid: google-cloud-profiler
name: Google Cloud Profiler
description: >-
  Google Cloud Profiler is a statistical, low-overhead profiling service that
  continuously monitors CPU usage and memory allocation in production
  applications. It attributes resource consumption to specific source code
  sections, supports Go, Java, Node.js, and Python, and provides flame graph
  visualizations for identifying performance bottlenecks with less than 5
  percent overhead.
